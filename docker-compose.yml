version: '3.8'

services:
  swebench-runner:
    image: swebench/sweb.eval.x86_64.base:latest
    container_name: swebench-runner
    working_dir: /testbed
    volumes:
      # Mount project directory to container
      - ./:/workspace
      # Mount output directory (real-time sync)
      - ./output:/workspace/output
      # Mount data directory
      - ./data:/workspace/data
    environment:
      # Claude Code authentication
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      # Codex authentication
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Model configuration
      - CLAUDE_MODEL=${CLAUDE_MODEL:-opus}
      - CODEX_MODEL=${CODEX_MODEL:-gpt-5.2}
      - CODEX_REASONING_EFFORT=${CODEX_REASONING_EFFORT:-xhigh}
      # Proxy settings (if needed)
      - http_proxy=${http_proxy:-}
      - https_proxy=${https_proxy:-}
    network_mode: host
    stdin_open: true
    tty: true
    command: >
      bash -c "
      /workspace/docker/configure_models.sh;
      exec /bin/bash"

  # Service for batch runs (optional)
  swebench-batch:
    image: swebench/sweb.eval.x86_64.base:latest
    container_name: swebench-batch
    working_dir: /testbed
    volumes:
      - ./:/workspace
      - ./output:/workspace/output
      - ./data:/workspace/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-sonnet}
      - CODEX_MODEL=${CODEX_MODEL:-gpt-5.2}
      - CODEX_REASONING_EFFORT=${CODEX_REASONING_EFFORT:-medium}
      - http_proxy=${http_proxy:-}
      - https_proxy=${https_proxy:-}
    network_mode: host
    stdin_open: true
    tty: true
    command: >
      bash -c "
      /workspace/docker/configure_models.sh;
      exec /bin/bash"
